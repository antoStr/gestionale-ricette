<div class="chef-layout">
    <!-- SIDEBAR DI SELEZIONE -->
    <aside class="sidebar">
        <h2>👨‍🍳 I Nostri Chef</h2>

        @if (chefSvc.loading()) {
        <p>Caricamento chef in corso...</p>
        } @else {
        <nav class="chef-list">
            @for (c of chefSvc.chefs(); track c.id) {
            <!-- Link relativo verso /chef/1, /chef/2, ecc. -->
            <a [routerLink]="[c.id]" routerLinkActive="active" class="chef-item">
                {{ c.nome | titlecase }}
            </a>
            }
        </nav>
        }
    </aside>

    <!-- CONTENUTO PRINCIPALE -->
    <main class="contenuto">
        <!-- ⚠️ TAG FONDAMENTALE PER IL NESTED ROUTING -->
        <router-outlet />
    </main>
</div>
